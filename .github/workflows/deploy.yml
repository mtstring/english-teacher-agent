name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "toeic-app/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: toeic-app/package-lock.json

      - name: Install dependencies
        working-directory: toeic-app
        run: npm ci

      - name: Build
        working-directory: toeic-app
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || '/' }}
        run: npm run build

      - name: SPA fallback for GitHub Pages
        run: cp toeic-app/dist/index.html toeic-app/dist/404.html

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: toeic-app/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
